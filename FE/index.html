<html>
    <head></head>
    <body>
        <script>
            const ws = new WebSocket("ws://localhost:8080", "echo-protocol");

            ws.onopen = function () {
                ws.send(
                    JSON.stringify({
                        type: "JOIN_ROOM",
                        payload: {
                            name: "Rishabh",
                            userId: "1",
                            roomId: "2",
                        },
                    }),
                );
            };

            ws.onmessage = function (event) {
                try {
                    const { payload, type } = JSON.parse(event.data);
                    if (type === "ADD_CHAT") {
                        const textnode = document.createElement("p");
                        textnode.innerHTML =
                            payload.message + `(${payload.upvotes})`;
                        document
                            .getElementById("messages")
                            .appendChild(textnode);
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            function sendChat() {
                const input = document.getElementById("inputtext");
                ws.send(
                    JSON.stringify({
                        type: "SEND_MESSAGE",
                        payload: {
                            message: input.value || "Hi there",
                            userId: "1",
                            roomId: "2",
                        },
                    }),
                );
            }
        </script>
        Hello World
        <br />
        <input type="text" id="inputtext" />
        <br />
        <div id="messages"></div>
        <button onclick="sendChat()">Send Chat</button>
    </body>
</html>
